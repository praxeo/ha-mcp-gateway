name = "ha-mcp-gateway"
main = "dist/worker.js"
compatibility_date = "2026-05-09"
workers_dev = true
ai = { binding = "AI" }

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[build]
command = "npx esbuild src/worker.js --bundle --outdir=dist --format=esm --outbase=src"

[[kv_namespaces]]
binding = "HA_CACHE"
id = "d341a11cfff149cdb99e5edee7612132"

[[d1_databases]]
binding = "DB"
database_name = "ha_db"
database_id = "71dd548f-632b-4e65-9ad6-f699db9f3a57"

# Unified multi-kind index — entity / automation / script / scene / area /
# device / service / memory / observation. The legacy ha-entities index and
# its VECTORIZE binding were dropped after the multi-kind index was verified.
# The ha-entities index itself is retained on Cloudflare as a rollback
# parachute and can be deleted via `wrangler vectorize delete ha-entities`
# once you're confident.
[[vectorize]]
binding = "KNOWLEDGE"
index_name = "ha-knowledge"

# Version metadata binding — exposes the deployed version ID to the
# worker and DO at runtime. Used by /admin/version to compare the
# worker isolate's loaded version (latest deploy) against the DO
# instance's loaded version (whatever was current when the DO last
# refreshed). Mismatch = DO is running stale code.
[version_metadata]
binding = "CF_VERSION_METADATA"

[[durable_objects.bindings]]
name = "HA_WS"
class_name = "HAWebSocketV29"

[[migrations]]
tag = "v1"
new_classes = ["HAWebSocket"]

# v2 forces a clean code refresh by renaming the class. The persistent HA
# WebSocket prevents the natural "10s idle → reload latest code" hibernation,
# so DO instances were stuck on stale code across multiple deploys. Renaming
# the class triggers Cloudflare's migration runtime to instantiate fresh DOs
# with the latest code while preserving DO storage state.
[[migrations]]
tag = "v2"
renamed_classes = [
  { from = "HAWebSocket", to = "HAWebSocketV2" }
]

# v3 — same trick. The autonomous-monitor excision (Deploy 3) left the live DO
# isolate running stale Deploy-1 code because the persistent HA WS keeps it
# resident across deploys. Renaming forces fresh instantiation. DO storage
# (snapshot, last_event_seen_ms, ai_memory, chat_history) is preserved.
[[migrations]]
tag = "v3"
renamed_classes = [
  { from = "HAWebSocketV2", to = "HAWebSocketV3" }
]

# v4 — noise-filter extensions (image.* skip, voltage 2V deadband, roborock
# cleaning-telemetry suffix denylist) live inside `_shouldLogStateChange` on
# the DO. The previous noise-filter tweak (commit b59cea7) was committed
# after the V3 rename and the live DO never picked it up — verified by D1
# showing 1,400+ summation_delivered rows in 1h despite the source-level
# hard-deny rule. Renaming forces fresh DO instantiation. State preserved.
[[migrations]]
tag = "v4"
renamed_classes = [
  { from = "HAWebSocketV3", to = "HAWebSocketV4" }
]

# v5 — report_bug storage architecture fix. Old code stored every bug under
# a single `bugs` array key, which blew the 128 KiB DO storage value cap
# after a handful of entries (each carries chat history + ai_log slices +
# entity state). Symptom: agent confabulated "Logged bug #..." replies
# after silent write failures. New layout: bug:<id> per-key plus a
# bug_ids index. Plus aggressive per-field trimming and an oversize
# fallback. The system prompt also gained a TOOL ERROR HANDLING rule
# forbidding success-confabulation after error results. DO-side changes
# require a rename to take effect — persistent HA WS keeps the live
# isolate from idling.
[[migrations]]
tag = "v5"
renamed_classes = [
  { from = "HAWebSocketV4", to = "HAWebSocketV5" }
]

[[migrations]]
tag = "v6"
renamed_classes = [
  { from = "HAWebSocketV5", to = "HAWebSocketV6" }
]

# v7 — phase-timing + token + intent_tag instrumentation in chatWithAgentNative
# and runNativeToolLoop. DO-side changes; persistent HA WS would otherwise pin
# the live isolate to stale V6 code and the new chat_timing_ms fields would
# never reach D1. Storage state preserved.
[[migrations]]
tag = "v7"
renamed_classes = [
  { from = "HAWebSocketV6", to = "HAWebSocketV7" }
]

# v8 — Step 0 preflight: DUMP_SYSTEM_PROMPT-gated per-component breakdown of
# the MiniMax request body in chatWithAgentNative. Used to ground the
# upcoming system-prompt trim against the literal prompt rather than
# estimates (V7 data showed per-iter floor at ~30k vs estimated ~18k).
# DO-side instrumentation; rename forces fresh isolate. State preserved.
[[migrations]]
tag = "v8"
renamed_classes = [
  { from = "HAWebSocketV7", to = "HAWebSocketV8" }
]

# v9 — System-prompt slim, deploy 1 (low-risk waste & duplication cuts):
# (1) timeline excludes chat_user/chat_reply (duplicated conversation_history),
# windowed to last 2h / 30 events; (2) deleted 7-layer architecture prose;
# (3) CHAT ACTION CONFIRMATION compressed to terse bullets, every invariant
# preserved; (4) save_memory criteria block removed from system prompt,
# compressed into the save_memory tool description instead; (5) RELEVANT
# ENTITIES JSON dump replaced by one-line text per entity, with load-bearing
# attrs preserved (climate setpoint/action, sensor unit); (6) GATEWAY HEALTH
# gated to degraded-only. Verified post-deploy: per-iter prompt 30k → 10.8k
# (~64% cut), zero action_hallucinations, model went from 13 get_state to 1
# on the status query (trusted the leaner snapshot).
[[migrations]]
tag = "v9"
renamed_classes = [
  { from = "HAWebSocketV8", to = "HAWebSocketV9" }
]

# v10 — System-prompt slim, deploy 2 (behavioral gating):
# (7) HOUSE_STATE_SNAPSHOT gated by HOUSE_STATUS_TRIGGER_RE — matches
# aggregate-state ("house", "status", "secure", "everything"), security
# ("alarm", "armed"), presence ("home", "away", "gone", "left", "back",
# "outside"), plus first names ("John", "Sabrina"). Open-ended fallback:
# include snapshot when vector retrieval surfaces no entities with score
# >= 0.65 (no specific target). Defensively included for legacy callers
# that don't pass `message`. (8) House topology (THE HOUSE / BASEMENT /
# MAIN LEVEL / ATTIC / OUTDOOR room prose) moved behind new
# `get_house_topology` zero-arg tool; LOCK MAP / GARAGE BAY DOOR /
# KEY DEVICES disambiguation tables remain in default prompt; persona
# gains a LAYOUT NOTE cue pointing to the tool. (9) MAX_TURNS reduced
# 10 → 8 in both fast and regular paths. Rename forces fresh DO isolate.
[[migrations]]
tag = "v10"
renamed_classes = [
  { from = "HAWebSocketV9", to = "HAWebSocketV10" }
]

# v11 — kill the wrap-up iteration for simple action commands.
# Two fixes:
# (1) HOUSE_STATE_SNAPSHOT PRESENCE now includes person.sabrina (was
# only person.john). "did Sabrina leave" was triggering the snapshot
# via name match but the snapshot lacked her entity, forcing the
# model to make a redundant get_state round-trip.
# (2) Post-tool fast-return in runNativeToolLoop: when a single simple
# action tool (light/switch/lock/scene + standard verbs) succeeds and
# the model emitted no accompanying text, synthesize "Done — <friendly>
# <verb>." server-side and return without the second MiniMax call.
# Saves ~5s on the most common command pattern (det_candidate turns
# previously hit 2 iters; now hit 1). Conservative whitelist — cover,
# climate, media, scripts, save_memory, save_observation, report_bug
# all keep the LLM wrap-up because their replies benefit from context.
# Rename forces fresh DO isolate. State preserved.
[[migrations]]
tag = "v11"
renamed_classes = [
  { from = "HAWebSocketV10", to = "HAWebSocketV11" }
]

# v12 — make quick-action garage buttons feel instant. Fast-path was
# measured at 133-165ms total but ~30-70ms of that was bookkeeping
# (logAI / storage.get+put / persistLog) executing BEFORE the SSE
# reply event fired. The HA service call already completed in step 0
# — the cover was already moving — so holding the reply for log
# writes was pure user-visible latency. V12 reorders: onEvent fires
# first, then logging and history persist happen after. Expected
# garage-button perceived latency: ~80-100ms (down from ~150ms).
# No behavior change. Rename forces fresh DO isolate. State preserved.
[[migrations]]
tag = "v12"
renamed_classes = [
  { from = "HAWebSocketV11", to = "HAWebSocketV12" }
]

# v13 — system-prompt restructure for MiniMax passive /v1 prefix caching.
# The per-request system message previously interleaved dynamic data
# (gateway health, climate preamble, house-state snapshot, timeline,
# semantic top-K blocks, relevant entities) throughout a ~17-20k-token
# prompt, so almost nothing matched MiniMax's leading-prefix cache and the
# whole prompt re-billed on every tool-loop iteration (2-6 per turn).
# getChatSystemPrompt is split into getStaticChatSystemPrompt() — a
# 100%-static system message, byte-identical every request — and
# buildDynamicContext(), which relocates all per-request data to lead the
# trailing user turn. Same content, no behavior change. Also adds
# cached_tokens instrumentation to runNativeToolLoop. DO-side code; the
# persistent HA WS pins the live isolate to stale V12 across plain deploys,
# so the rename forces a fresh isolate. DO storage state preserved.
[[migrations]]
tag = "v13"
renamed_classes = [
  { from = "HAWebSocketV12", to = "HAWebSocketV13" }
]

# v14 — Groq input-validation fix. callLLMWithTools echoed Groq response
# messages back into the request on every tool-loop iteration; those
# messages carry response-only fields (audio_content, reasoning, ...) and
# Groq's strict input validation 400'd ("property 'audio_content' is
# unsupported"). sanitizeMessagesForLLM now reduces assistant messages to
# OpenAI input fields (role, content, tool_calls) before every call.
# DO-side code; the persistent HA WS pins the live isolate to stale V13,
# so the rename forces a fresh isolate. DO storage state preserved.
[[migrations]]
tag = "v14"
renamed_classes = [
  { from = "HAWebSocketV13", to = "HAWebSocketV14" }
]

# v15 — bump LLM_REASONING_EFFORT low → medium on gpt-oss-120b. Medium is
# the model default per Groq docs; we had been running below default.
# DO-side constant; persistent HA WS pins live isolate to stale V14.
# Rename forces fresh isolate. DO storage state preserved.
[[migrations]]
tag = "v15"
renamed_classes = [
  { from = "HAWebSocketV14", to = "HAWebSocketV15" }
]

# v16 — revert to MiniMax-M2.7-highspeed. GPT-OSS-120b on Groq produced
# poor tool-loop behavior: fabricated entity states, reasoning paralysis,
# premature synthesis fallback. MiniMax handles multi-step agentic tool
# calling significantly better. Auth switches back to MINIMAX_API_KEY.
# reasoning_effort/reasoning_format removed; reasoning_split: true added.
# DO-side changes; rename forces fresh isolate. Storage preserved.
[[migrations]]
tag = "v16"
renamed_classes = [
  { from = "HAWebSocketV15", to = "HAWebSocketV16" }
]

# v17 — switch LLM provider to DeepSeek V4 Flash on Fireworks. MiniMax
# endpoint/model/auth swapped for Fireworks; reasoning_split removed,
# max_completion_tokens → max_tokens. DO-side code; rename forces a fresh
# isolate. DO storage state preserved.
[[migrations]]
tag = "v17"
renamed_classes = [
  { from = "HAWebSocketV16", to = "HAWebSocketV17" }
]

# v18 — enable DeepSeek V4 Flash Think High reasoning mode. Adds
# thinking/reasoning_effort to the request body; raises the tool-loop
# max_tokens budget. DO-side code; rename forces a fresh isolate.
# DO storage state preserved.
[[migrations]]
tag = "v18"
renamed_classes = [
  { from = "HAWebSocketV17", to = "HAWebSocketV18" }
]

# v19 — hotfix: Fireworks rejects 'thinking' and 'reasoning_effort' together
# ("cannot specify both"). Drop the 'thinking' field; reasoning_effort:"high"
# alone enables DeepSeek V4 Think High. DO-side code; rename forces a fresh
# isolate. DO storage state preserved.
[[migrations]]
tag = "v19"
renamed_classes = [
  { from = "HAWebSocketV18", to = "HAWebSocketV19" }
]

# v20 — preserve reasoning_content across tool-call rounds. Fireworks
# requires prior-turn reasoning_content echoed back for interleaved
# thinking; sanitizeMessagesForLLM + runNativeToolLoop no longer strip
# it. DO-side code; rename forces a fresh isolate. Storage preserved.
[[migrations]]
tag = "v20"
renamed_classes = [
  { from = "HAWebSocketV19", to = "HAWebSocketV20" }
]

# v21 — chat-prompt trim (history/timeline/K-value cuts, condensed tool
# schemas, snapshot tightening) + Tesla Model Y knowledge (snapshot group
# + QUICK FACTS). DO-side code; rename forces a fresh isolate. Storage
# preserved.
[[migrations]]
tag = "v21"
renamed_classes = [
  { from = "HAWebSocketV20", to = "HAWebSocketV21" }
]

# v22 — light service-data sanitizer. light.turn_on / light.toggle accepts
# at most one color descriptor and each requires a matching mode in
# attributes.supported_color_modes; DeepSeek V4 Flash repeatedly fails the
# call by sending multiple or unsupported descriptors alongside
# brightness_pct. _sanitizeLightServiceData reads supported_color_modes
# from stateCache and strips bad descriptors before the call reaches HA,
# keeping one by priority if multiple compatible ones remain. Wired into
# both executeAIAction (chat path) and the DO /call_service route (MCP
# path). Light entity context now includes brightness, supported_color_modes,
# color_mode so the model can see the capability up front. Static prompt
# gains one QUICK FACTS bullet about the constraint. DO-side code; rename
# forces a fresh isolate. Storage preserved.
[[migrations]]
tag = "v22"
renamed_classes = [
  { from = "HAWebSocketV21", to = "HAWebSocketV22" }
]

# v23 — ephemeral one-shot scheduler. Adds three new tools to both the chat
# native surface and the MCP surface: schedule_action (queue a delayed HA
# service call), list_scheduled_actions, cancel_scheduled_action. Pending
# tasks live in DO storage under the `scheduled:<id>` namespace; the existing
# 60s alarm() tick gains a _fireDueScheduledActions() pass that deletes-
# before-fire (better to lose a task than fire twice). Enables "turn off the
# drop lights in an hour" / "turn the AC down 2 for an hour" patterns
# without polluting HA's automations list. DO-side code; rename forces a
# fresh isolate. Storage preserved.
[[migrations]]
tag = "v23"
renamed_classes = [
  { from = "HAWebSocketV22", to = "HAWebSocketV23" }
]

# v24 — drop Tesla wake-first gate. The chat prompt previously instructed the
# agent to press button.tesla_model_y_wake and wait whenever
# binary_sensor.tesla_model_y_status read asleep/offline, then send the
# requested command. In practice the Tesla API wakes the car as a side effect
# of climate.set_temperature, climate.turn_on, lock/unlock, switch.turn_on/off,
# and cover open/close — and the status sensor lags, so the gate stalls even
# when the car is already responding. New rule: send the command directly; the
# wake button is a fallback used only after the actual command errors, with no
# retry loop on the wake itself. DO-side prompt; rename forces a fresh
# isolate. Storage preserved.
[[migrations]]
tag = "v24"
renamed_classes = [
  { from = "HAWebSocketV23", to = "HAWebSocketV24" }
]

# v25 forces a fresh isolate so the hardened cover fast-path guards go live.
# A forensic/timeline question ("show me a timeline for when the garage door
# opened ... figure out if the Tesla can open the garage") was matching the
# bare verb "open" and physically opening the door; the guards now bail such
# questions to the LLM. Storage preserved.
[[migrations]]
tag = "v25"
renamed_classes = [
  { from = "HAWebSocketV24", to = "HAWebSocketV25" }
]

# v26 — Fireworks session affinity + perf-header capture. A fixed
# x-session-affinity header pins all gateway traffic to one serverless replica
# so the byte-identical static prefix (the V13 split) actually stays cache-warm
# across turns and tool-loop iterations — Fireworks caching is replica-local,
# so without a routing hint consecutive turns miss the warm KV even inside its
# TTL. Also captures the fireworks-* perf response headers (server TTFT,
# prompt/cached tokens) into per_iteration timing to split prefill vs
# generation. DO-side code; the persistent HA WS pins the live isolate to stale
# V25 across plain deploys, so the rename forces a fresh isolate. Storage
# preserved.
[[migrations]]
tag = "v26"
renamed_classes = [
  { from = "HAWebSocketV25", to = "HAWebSocketV26" }
]

# v27 — swap the chat model to MiniMax M3 on Fireworks (LLM_MODEL
# deepseek-v4-flash → minimax-m3). M3 on Fireworks enables thinking via the
# thinking:{type:"enabled"} toggle rather than reasoning_effort and rejects
# both together, so callLLM / callLLMWithTools now send the toggle and drop
# reasoning_effort. Reasoning still returns in reasoning_content, so the
# reasoning extraction, SSE reasoning stream, and prior-turn reasoning re-feed
# are unchanged. DO-side code; the persistent HA WS pins the live isolate to
# stale V26 across plain deploys, so the rename forces a fresh isolate.
# Storage preserved.
[[migrations]]
tag = "v27"
renamed_classes = [
  { from = "HAWebSocketV26", to = "HAWebSocketV27" }
]

# v28 — flat tool-argument healing for call_service / schedule_action.
# MiniMax M3 (live since V27) emits service parameters — entity_id,
# temperature, etc. — at the TOP LEVEL of the tool call instead of nested
# inside `data` / `service_data`. The dispatchers (executeNativeTool) and
# the scheduler (_fireDueScheduledActions fires with target:{}) only read
# the nested object, so the flat params were silently dropped: HA rejected
# climate.turn_on with "must contain at least one of entity_id, ..." and
# climate.set_temperature with "must contain at least one of temperature,
# ...". Symptom: the agent couldn't precondition the Tesla and a scheduled
# "set AC to 73 at 4pm" fired with empty data. coalesceServiceData() folds
# stray top-level keys (and target.entity_id) into the nested data object
# before dispatch. DO-side code; the persistent HA WS pins the live isolate
# to stale V27 across plain deploys, so the rename forces a fresh isolate.
# Storage preserved.
[[migrations]]
tag = "v28"
renamed_classes = [
  { from = "HAWebSocketV27", to = "HAWebSocketV28" }
]

# v29 — runtime-configurable LLM config + default model swap to Qwen 3.7 Plus.
# The chat/agent model, endpoint, and reasoning mode are now resolved at call
# time (resolveLLMConfig: DO storage override → env vars → baked-in defaults)
# instead of being read straight from the static class constants. A new
# /llm_config DO route (and /admin/llm-config worker route) sets the storage
# override, so a model swap (e.g. Qwen ↔ MiniMax) goes live with no rename or
# redeploy — the route updates the in-process cache too. Fireworks rejects
# `thinking` + `reasoning_effort` together, so applyReasoningToBody emits exactly
# one based on reasoning_mode ("thinking"/"effort"/"none"). Default flips
# minimax-m3 → qwen3p7-plus (reasoning_mode "thinking"); reasoning still returns
# in reasoning_content so extraction/SSE/re-feed are unchanged. DO-side code;
# the persistent HA WS pins the live isolate to stale V28 across plain deploys,
# so this rename forces a fresh isolate (which also picks up the new default).
# Storage preserved, including any existing llm_config override.
[[migrations]]
tag = "v29"
renamed_classes = [
  { from = "HAWebSocketV28", to = "HAWebSocketV29" }
]

# Two cron triggers:
#   "* * * * *"   — minute-level cache prewarm (existing behavior)
#   "30 8 * * *"  — daily heavy resync of the slow-changing kinds in the
#                   knowledge index. 08:30 UTC = 03:30 CDT (a low-activity
#                   window for this household; in CST winter it lands at
#                   02:30 local — also fine).
[triggers]
crons = ["* * * * *", "30 8 * * *"]
